      required:
        - status
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string

    RequestContact:
      type: object
      required: [name, role]
      properties:
        name:
          type: string
        phone:
          type: ["string", "null"]
        role:
          type: string
          enum: [customer, provider]
          description: The role of the counterparty whose contact is returned.

    User:
      type: object
      required: [id, authUserId, name, role, createdAt, updatedAt]
      properties:
        id:
          type: integer
        authUserId:
          type: string
        name:
          type: string
        email:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        role:
          type: string
          enum: [customer, provider, admin]
        avatarUrl:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        lat:
          type: ["number", "null"]
        lng:
          type: ["number", "null"]
        commissionAgreedAt:
          type: ["string", "null"]
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    UserInput:
      type: object
      required: [name, role]
      properties:
        name:
          type: string
          minLength: 1
        role:
          type: string
          enum: [customer, provider]
        email:
          type: string
        phone:
          type: string
        commissionAgreed:
          type: boolean
          description: Required true when role is "provider"; records consent to the platform commission.
        language:
          type: string
          enum: [ar, en, he]
          description: Preferred UI language; used to localize server-sent notifications.
    UserUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        phone:
          type: string
        avatarUrl:
          type: string
        address:
          type: ["string", "null"]
        lat:
          type: ["number", "null"]
        lng:
          type: ["number", "null"]

    Provider:
      type: object
      required:
        [
          id,
          userId,
          status,
          rating,
          ratingCount,
          isAvailable,
          createdAt,
          updatedAt,
        ]
      properties:
        id:
          type: integer
        userId:
          type: integer
        name:
          type: ["string", "null"]
        serviceType:
          type: ["string", "null"]
        bio:
          type: ["string", "null"]
        experienceYears:
          type: ["integer", "null"]
        phone:
          type: ["string", "null"]
        city:
          type: ["string", "null"]
        addressText:
          type: ["string", "null"]
        docOsekPaturPath:
          type: ["string", "null"]
        docOsekMurshePath:
          type: ["string", "null"]
        docIdPath:
          type: ["string", "null"]
        reviewNote:
          type: ["string", "null"]
        reviewRequestedAt:
          type: ["string", "null"]
          format: date-time
        status:
          type: string
          enum: [pending, under_review, needs_info, approved, rejected]
        rating:
          type: number
        ratingCount:
          type: integer
        isAvailable:
          type: boolean
        availableFrom:
          type: ["string", "null"]
        availableTo:
          type: ["string", "null"]
        lat:
          type: ["number", "null"]
        lng:
          type: ["number", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    ProviderInput:
      type: object
      required: [phone, addressText, docOsekPaturPath, docIdPath]
      properties:
        serviceType:
          type: string
          minLength: 1
        bio:
          type: string
        experienceYears:
          type: integer
          minimum: 0
          maximum: 60
        phone:
          type: string
          minLength: 1
        city:
          type: string
        addressText:
          type: string
          minLength: 1
        docOsekPaturPath:
          type: string
          minLength: 1
        docOsekMurshePath:
          type: string
        docIdPath:
          type: string
          minLength: 1
        lat:
          type: number
        lng:
          type: number
    ProviderUpdate:
      type: object
      properties:
        serviceType:
          type: ["string", "null"]
        bio:
          type: string
        experienceYears:
          type: integer
          minimum: 0
          maximum: 60
        phone:
          type: string
        city:
          type: string
        addressText:
          type: string
        docOsekPaturPath:
          type: string
        docOsekMurshePath:
          type: ["string", "null"]
        docIdPath:
          type: string
        isAvailable:
          type: boolean
        availableFrom:
          type: ["string", "null"]
        availableTo:
          type: ["string", "null"]
        lat:
          type: number
        lng:
          type: number
        reviewNote:
          type: ["string", "null"]
