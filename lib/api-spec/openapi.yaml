        userId:
          type: integer
        providerId:
          type: ["integer", "null"]
        skillId:
          type: integer
        description:
          type: ["string", "null"]
        imageUrl:
          type: ["string", "null"]
        videoUrl:
          type: ["string", "null"]
        includesSpareParts:
          type: boolean
        lat:
          type: ["number", "null"]
        lng:
          type: ["number", "null"]
        address:
          type: ["string", "null"]
        paymentMethod:
          type: ["string", "null"]
          enum: [on_site, null]
        status:
          type: string
