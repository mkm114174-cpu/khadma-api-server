      properties:
        skillId:
          type: integer
        description:
          type: string
        imageUrl:
          type: string
        videoUrl:
          type: string
        includesSpareParts:
          type: boolean
        lat:
          type: number
        lng:
          type: number
        address:
          type: string
        paymentMethod:
          type: string
          enum: [on_site]
        priceMin:
          type: integer
        priceMax:
          type: integer
        preferredTime:
          type: string
          format: date-time
        scheduledTime:
          type: string
          format: date-time
    RequestUpdate:
      type: object
      properties:
