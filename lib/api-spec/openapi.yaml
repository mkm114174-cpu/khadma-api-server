        availableTime:
          type: ["string", "null"]
          format: date-time
        estimatedDuration:
          type: ["string", "null"]
        status:
          type: string
          enum: [pending, accepted, rejected]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    OfferInput:
      type: object
      required: [requestId, price]
      properties:
        requestId:
          type: integer
        price:
          type: integer
