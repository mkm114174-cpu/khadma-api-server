name: khadma
description: Khadma — home services marketplace (Flutter port from Expo/React Native).
publish_to: "none"
version: 1.0.6+7

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Navigation (expo-router → go_router)
  go_router: ^14.8.1

  # State management (React Context + TanStack Query → Riverpod)
  flutter_riverpod: ^2.6.1

  # HTTP / API (fetch + custom-fetch → dio)
  dio: ^5.8.0+1

  # Local storage (AsyncStorage → shared_preferences)
  shared_preferences: ^2.5.3

  # Secure storage (expo-secure-store → flutter_secure_storage)
  flutter_secure_storage: ^9.2.4

  # Location (expo-location → geolocator + geocoding)
  geolocator: ^13.0.4
  geocoding: ^3.0.0

  # Images (expo-image → cached_network_image)
  cached_network_image: ^3.4.1

  # Image picker (expo-image-picker)
  image_picker: ^1.1.2

  # Fonts (expo-font / Inter → google_fonts)
  google_fonts: ^6.2.1

  # Maps (react-native-maps → google_maps_flutter)
  google_maps_flutter: ^2.12.1

  # Video / audio (expo-video / expo-audio)
  video_player: ^2.9.5
  audioplayers: ^6.4.0

  # Haptics (expo-haptics)
  vibration: ^3.1.3

  # Icons (@expo/vector-icons / Feather)
  flutter_feather_icons: ^2.0.0+1

  # URL / deep links (expo-linking)
  url_launcher: ^6.3.1
  app_links: ^6.4.0

  # Permissions
  permission_handler: ^11.4.0

  # Utilities
  intl: ^0.19.0
  equatable: ^2.0.7
  uuid: ^4.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
