name: Android APK

on:
  workflow_dispatch:
  push:
    branches: [master, main]
    paths:
      - "artifacts/khadma/**"
      - "lib/api-client-react/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/android-apk.yml"

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK with Gradle
        working-directory: artifacts/khadma
        env:
          EXPO_PUBLIC_DOMAIN: ${{ vars.EXPO_PUBLIC_DOMAIN }}
          EXPO_PUBLIC_NEON_AUTH_URL: ${{ vars.EXPO_PUBLIC_NEON_AUTH_URL }}
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          NODE_ENV: production
        run: |
          export EXPO_PUBLIC_DOMAIN="${EXPO_PUBLIC_DOMAIN:-localhost}"
          export EXPO_PUBLIC_NEON_AUTH_URL="${EXPO_PUBLIC_NEON_AUTH_URL:-}"
          export GOOGLE_MAPS_API_KEY="${GOOGLE_MAPS_API_KEY:-placeholder}"
          node scripts/build-android.mjs --force

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: khadma-release-apk
          path: artifacts/khadma/dist/khadma-release.apk
          if-no-files-found: error
