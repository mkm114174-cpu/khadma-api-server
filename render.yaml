services:
  - type: web
    name: khadma-api
    runtime: node
    plan: free
    buildCommand: bash scripts/render-build.sh
    startCommand: bash scripts/render-start.sh
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8080
      - key: DATABASE_URL
        sync: false
      - key: NEON_AUTH_BASE_URL
        sync: false
      # Optional — GCS JSON for file uploads on Render (not Replit).
      - key: GCS_SERVICE_ACCOUNT_JSON
        sync: false
      - key: PUBLIC_OBJECT_SEARCH_PATHS
        sync: false
      - key: PRIVATE_OBJECT_DIR
        sync: false
