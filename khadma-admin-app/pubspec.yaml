publish_to: "none"
version: 1.0.3+4

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  go_router: ^14.8.1
  flutter_riverpod: ^2.6.1
  dio: ^5.8.0+1
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^9.2.4
  google_fonts: ^6.2.1
  flutter_feather_icons: ^2.0.0+1
  intl: ^0.19.0
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  equatable: ^2.0.7
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
