kind = "mobile"
previewPath = "/"
title = "خدمة (Khadma)"
version = "1.0.0"
id = "artifacts/khadma"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 26258

[services.development]
run = "pnpm --filter @workspace/khadma run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/khadma", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/khadma", "run", "serve" ]

[services.env]
PORT = "26258"
BASE_PATH = "/"
