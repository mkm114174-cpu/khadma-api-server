kind = "web"
previewPath = "/admin/"
title = "Khadma Admin"
version = "1.0.0"
id = "artifacts/admin"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/admin/" ]
localPort = 23744

[services.development]
run = "pnpm --filter @workspace/admin run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/admin", "run", "build" ]
publicDir = "artifacts/admin/dist/public"
serve = "static"

[services.production.build.env]
VITE_NEON_AUTH_URL = "$NEON_AUTH_BASE_URL"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23744"
BASE_PATH = "/admin/"
VITE_NEON_AUTH_URL = "$NEON_AUTH_BASE_URL"
